<!DOCTYPE html>
<html lang="ru">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Таблица</title>
</head>
<body>

                <th class="weekday red-text">ВС</th>

        </thead>

                <td>30</td>

                <td class="empty-cell"></td>

    </table>
</div>
</body>
</html>
