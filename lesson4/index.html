<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>форма</title>
</head>
<body>
    <div>
    <h1>Ваши личные данные</h1>
    <form action="">
        <label for="name">Ваше имя</label><br>
        <input type="text" id="name" placeholder="Имя"><br><br>

        <label for="age">Ваш возраст</label><br>
        <input type="number" id="age" placeholder="Возраст"><br><br>

        <label for="phone">Ваш номер телефона</label><br>
        <input type="tel" id="phone" placeholder="Номер телефона"><br><br>

        <label for="email">Ваша почта</label><br>
        <input type="email" id="email" placeholder="Почта"><br><br>

        <label for="message">Сообщение</label><br>
        <textarea id="message" placeholder="Ваше сообщение"></textarea><br><br>

        <input type="checkbox" id="rules">
        <label for="rules">Я принимаю правила</label><br><br>

        <input class="button" type="submit" value="Отправить">
    </form>
    </div>
</body>
</html>
